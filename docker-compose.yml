version: '3.8'

services:
  appium-node-1:
    build: .
    ports:
      - "4723:4723"
    environment:
      - EMULATOR_DEVICE=Pixel_4
      - EMULATOR_SDK=30
      - APPIUM_PORT=4723
    volumes:
      - ./app:/app
    networks:
      - appium-network

  appium-node-2:
    build: .
    ports:
      - "4724:4723"
    environment:
      - EMULATOR_DEVICE=Pixel_4
      - EMULATOR_SDK=30
